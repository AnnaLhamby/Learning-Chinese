<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#17694c" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Chinese Cards" />
    <title>Chinese Vocabulary Flashcards</title>
    <style>
:root {
  color-scheme: light;
  --ink: #18201d;
  --muted: #65706b;
  --line: #d9dfdb;
  --paper: #fbfaf6;
  --panel: #ffffff;
  --green: #17694c;
  --green-dark: #104d39;
  --red: #b84233;
  --blue: #235789;
  --gold: #d79b2b;
  --shadow: 0 24px 70px rgba(31, 42, 36, 0.14);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  background: var(--paper);
  color: var(--ink);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

button,
input,
select {
  font: inherit;
}

button {
  cursor: pointer;
}

.app-shell {
  width: min(1180px, calc(100% - 32px));
  margin: 0 auto;
  padding: 28px 0;
}

.topbar {
  display: flex;
  justify-content: space-between;
  gap: 20px;
  align-items: end;
  padding-bottom: 18px;
  border-bottom: 1px solid var(--line);
}

.eyebrow {
  margin: 0 0 6px;
  color: var(--green);
  font-size: 0.78rem;
  font-weight: 800;
  letter-spacing: 0;
  text-transform: uppercase;
}

h1,
h2,
p {
  margin: 0;
}

h1 {
  font-size: clamp(2rem, 4vw, 3.6rem);
  line-height: 0.95;
}

.stats {
  display: grid;
  grid-template-columns: repeat(3, minmax(74px, 1fr));
  gap: 10px;
}

.stats div {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 10px 12px;
  min-width: 82px;
  box-shadow: 0 10px 28px rgba(31, 42, 36, 0.07);
}

.stats span {
  display: block;
  font-size: 1.25rem;
  font-weight: 800;
}

.stats small {
  color: var(--muted);
}

.workspace {
  display: grid;
  grid-template-columns: 260px minmax(0, 1fr);
  gap: 18px;
  margin-top: 18px;
}

.controls,
.practice-panel,
.vocab-table {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 8px;
  box-shadow: var(--shadow);
}

.controls {
  display: flex;
  flex-direction: column;
  gap: 18px;
  padding: 18px;
  align-self: start;
}

.control-group {
  display: grid;
  gap: 8px;
}

.control-group > label {
  color: var(--muted);
  font-size: 0.82rem;
  font-weight: 800;
}

select,
input {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
  color: var(--ink);
  min-height: 42px;
  padding: 0 12px;
}

.segmented {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  padding: 3px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #f0f3ef;
}

.mode-button {
  border: 0;
  background: transparent;
  border-radius: 6px;
  min-height: 36px;
  font-weight: 800;
  color: var(--muted);
}

.mode-button.active {
  color: #fff;
  background: var(--green);
}

.check-row {
  display: flex;
  gap: 10px;
  align-items: center;
  min-height: 32px;
}

.check-row input {
  width: 18px;
  min-height: 18px;
  accent-color: var(--green);
}

.button-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.add-card-form {
  display: grid;
  gap: 8px;
  padding-top: 16px;
  border-top: 1px solid var(--line);
}

.add-card-form > label {
  color: var(--muted);
  font-size: 0.82rem;
  font-weight: 800;
}

.add-card-form button {
  min-height: 42px;
}

.add-card-status {
  min-height: 20px;
  color: var(--green);
  font-size: 0.86rem;
  font-weight: 800;
}

.primary,
.secondary,
.type-form button {
  border: 1px solid transparent;
  border-radius: 8px;
  min-height: 46px;
  font-weight: 850;
}

.primary {
  background: var(--green);
  color: #fff;
}

.primary:hover {
  background: var(--green-dark);
}

.secondary {
  background: #f6f7f4;
  border-color: var(--line);
  color: var(--ink);
}

.secondary:hover {
  border-color: #aab5ae;
}

.practice-panel {
  padding: 22px;
  min-height: 620px;
  display: grid;
  grid-template-rows: auto minmax(330px, 1fr) auto auto;
  gap: 16px;
}

.card-meta {
  display: flex;
  justify-content: space-between;
  color: var(--muted);
  font-size: 0.9rem;
  font-weight: 750;
}

.flashcard {
  display: grid;
  place-items: center;
  align-content: center;
  gap: 14px;
  width: 100%;
  min-height: 350px;
  border: 1px solid #cbd6cf;
  border-radius: 8px;
  background:
    linear-gradient(90deg, rgba(23, 105, 76, 0.07) 1px, transparent 1px),
    linear-gradient(rgba(35, 87, 137, 0.06) 1px, transparent 1px),
    #fffefa;
  background-size: 38px 38px;
  color: var(--ink);
  padding: 26px;
}

.prompt-label,
.tap-hint {
  color: var(--muted);
  font-size: 0.9rem;
  font-weight: 800;
}

.card-front {
  width: 100%;
  text-align: center;
  overflow-wrap: anywhere;
  font-family: "PingFang TC", "Noto Sans CJK TC", "Microsoft JhengHei", ui-sans-serif, sans-serif;
  font-size: clamp(3rem, 12vw, 7.5rem);
  font-weight: 800;
  line-height: 1;
}

.card-pinyin {
  min-height: 28px;
  color: var(--blue);
  font-size: clamp(1.15rem, 3vw, 1.8rem);
  font-weight: 800;
}

.answer-panel {
  display: grid;
  gap: 4px;
  padding: 16px;
  border-left: 5px solid var(--gold);
  background: #fff7e8;
  border-radius: 8px;
}

.answer-panel p:first-child {
  font-size: 1.35rem;
  font-weight: 850;
}

.answer-panel p:last-child {
  color: var(--muted);
  font-weight: 750;
}

.type-form {
  display: grid;
  gap: 8px;
}

.type-form label {
  color: var(--muted);
  font-size: 0.82rem;
  font-weight: 800;
}

.type-form div {
  display: grid;
  grid-template-columns: 1fr 110px;
  gap: 8px;
}

.type-form button {
  background: var(--blue);
  color: white;
}

.type-feedback {
  min-height: 24px;
  color: var(--red);
  font-weight: 800;
}

.actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.wide {
  width: 100%;
}

.hidden {
  display: none;
}

.vocab-table {
  margin-top: 18px;
  padding: 18px;
}

.table-head {
  display: grid;
  grid-template-columns: 220px 1fr;
  gap: 16px;
  align-items: center;
  margin-bottom: 14px;
}

.table-head h2 {
  font-size: 1.2rem;
}

.vocab-list {
  display: grid;
  gap: 8px;
  max-height: 420px;
  overflow: auto;
  padding-right: 4px;
}

.vocab-row {
  display: grid;
  grid-template-columns: 1.1fr 1.2fr 2fr 100px 42px;
  gap: 12px;
  align-items: center;
  padding: 10px 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fffefa;
}

.vocab-row strong {
  font-family: "PingFang TC", "Noto Sans CJK TC", "Microsoft JhengHei", ui-sans-serif, sans-serif;
  font-size: 1.25rem;
}

.vocab-row span,
.vocab-row small {
  color: var(--muted);
}

.delete-card {
  width: 34px;
  height: 34px;
  border: 1px solid #efc5bd;
  border-radius: 8px;
  background: #fff2ef;
  color: var(--red);
  font-size: 1.2rem;
  font-weight: 850;
  line-height: 1;
}

.delete-card:hover {
  background: #ffe5df;
}

@media (max-width: 820px) {
  .app-shell {
    width: min(100% - 20px, 720px);
    padding: 16px 0;
  }

  .topbar,
  .workspace,
  .table-head {
    grid-template-columns: 1fr;
    display: grid;
  }

  .stats {
    width: 100%;
  }

  .controls {
    position: static;
  }

  .practice-panel {
    min-height: auto;
    padding: 14px;
  }

  .flashcard {
    min-height: 300px;
  }

  .vocab-row {
    grid-template-columns: 1fr;
    gap: 4px;
  }
}

</style>
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar" aria-label="Deck controls">
        <div>
          <p class="eyebrow">College Chinese practice</p>
          <h1>Vocabulary Flashcards</h1>
        </div>
        <div class="stats" aria-label="Session statistics">
          <div>
            <span id="deck-count">0</span>
            <small>cards</small>
          </div>
          <div>
            <span id="score">0/0</span>
            <small>score</small>
          </div>
          <div>
            <span id="streak">0</span>
            <small>streak</small>
          </div>
        </div>
      </section>

      <section class="workspace">
        <aside class="controls" aria-label="Practice settings">
          <div class="control-group">
            <label for="deck-select">Deck</label>
            <select id="deck-select">
              <option value="all">All lessons + numbers</option>
              <option value="lesson-1">Lesson 1</option>
              <option value="lesson-2">Lesson 2</option>
              <option value="lesson-3">Lesson 3</option>
              <option value="lesson-4">Lesson 4</option>
              <option value="numbers">Numbers</option>
              <option value="custom">My cards</option>
              <option value="review">Review only</option>
            </select>
          </div>

          <div class="control-group">
            <label>Prompt</label>
            <div class="segmented" role="group" aria-label="Prompt mode">
              <button class="mode-button active" type="button" data-mode="hanzi">字</button>
              <button class="mode-button" type="button" data-mode="english">EN</button>
              <button class="mode-button" type="button" data-mode="pinyin">PY</button>
            </div>
          </div>

          <div class="control-group">
            <label>Options</label>
            <label class="check-row">
              <input id="shuffle-toggle" type="checkbox" checked />
              <span>Shuffle cards</span>
            </label>
            <label class="check-row">
              <input id="type-toggle" type="checkbox" />
              <span>Typing practice</span>
            </label>
          </div>

          <div class="button-grid">
            <button id="reset-session" class="secondary" type="button" title="Reset session">
              <span aria-hidden="true">↻</span>
            </button>
            <button id="mark-review" class="secondary" type="button" title="Add or remove from review">
              <span aria-hidden="true">☆</span>
            </button>
            <button id="speak-card" class="secondary" type="button" title="Speak Chinese">
              <span aria-hidden="true">▶</span>
            </button>
          </div>

          <form id="add-card-form" class="add-card-form">
            <label>Add Card</label>
            <input id="new-hanzi" required placeholder="Chinese characters" />
            <input id="new-pinyin" required placeholder="Pinyin" />
            <input id="new-english" required placeholder="English meaning" />
            <select id="new-deck">
              <option value="custom">My cards</option>
              <option value="lesson-1">Lesson 1</option>
              <option value="lesson-2">Lesson 2</option>
              <option value="lesson-3">Lesson 3</option>
              <option value="lesson-4">Lesson 4</option>
              <option value="numbers">Numbers</option>
            </select>
            <button class="primary" type="submit">Add</button>
            <p id="add-card-status" class="add-card-status"></p>
          </form>
        </aside>

        <section class="practice-panel" aria-live="polite">
          <div class="card-meta">
            <span id="card-lesson">Lesson</span>
            <span id="card-position">0 / 0</span>
          </div>

          <button id="flashcard" class="flashcard" type="button" aria-label="Reveal flashcard answer">
            <span id="prompt-label" class="prompt-label">Chinese</span>
            <span id="card-front" class="card-front">我</span>
            <span id="card-pinyin" class="card-pinyin">wǒ</span>
            <span id="tap-hint" class="tap-hint">Tap to reveal</span>
          </button>

          <div id="answer-panel" class="answer-panel hidden">
            <p id="answer-main"></p>
            <p id="answer-extra"></p>
          </div>

          <form id="type-form" class="type-form hidden">
            <label for="typed-answer">Your answer</label>
            <div>
              <input id="typed-answer" autocomplete="off" />
              <button type="submit">Check</button>
            </div>
            <p id="type-feedback" class="type-feedback"></p>
          </form>

          <div class="actions">
            <button id="again-button" class="secondary wide" type="button">Again</button>
            <button id="know-button" class="primary wide" type="button">Know it</button>
          </div>
        </section>
      </section>

      <section class="vocab-table" aria-label="Current deck list">
        <div class="table-head">
          <h2>Current Deck</h2>
          <input id="search-input" type="search" placeholder="Search Chinese, pinyin, or English" />
        </div>
        <div id="vocab-list" class="vocab-list"></div>
      </section>
    </main>

  { deck: "lesson-4", hanzi: "一共", pinyin: "yí gòng", english: "altogether; total" },

  { deck: "lesson-4", hanzi: "外帶", pinyin: "wài dài", english: "takeout" },
  { deck: "lesson-4", hanzi: "內用", pinyin: "nèi yòng", english: "for here; eat here" },
  { deck: "lesson-4", hanzi: "新", pinyin: "xīn", english: "new" },
  { deck: "lesson-4", hanzi: "舊", pinyin: "jiù", english: "old; used" },
  { deck: "lesson-4", hanzi: "太...了", pinyin: "tài...le", english: "too; extremely" },
  { deck: "lesson-4", hanzi: "貴", pinyin: "guì", english: "expensive" },
  { deck: "lesson-4", hanzi: "便宜", pinyin: "pián yí", english: "cheap; inexpensive" },
  { deck: "lesson-4", hanzi: "種", pinyin: "zhǒng", english: "kind; type" },
  { deck: "lesson-4", hanzi: "能", pinyin: "néng", english: "can; able to" },
  { deck: "lesson-4", hanzi: "百", pinyin: "bǎi", english: "hundred" },
  { deck: "lesson-4", hanzi: "千", pinyin: "qiān", english: "thousand" },
  { deck: "lesson-4", hanzi: "萬", pinyin: "wàn", english: "ten thousand" },
  { deck: "lesson-4", hanzi: "支", pinyin: "zhī", english: "measure word for long thin things" },
  { deck: "lesson-4", hanzi: "手機", pinyin: "shǒu jī", english: "mobile phone" },
  { deck: "lesson-4", hanzi: "上網", pinyin: "shàng wǎng", english: "to go online" },
  { deck: "lesson-4", hanzi: "冰", pinyin: "bīng", english: "iced; ice" },
  { deck: "lesson-4", hanzi: "元", pinyin: "yuán", english: "written money unit; yuan/dollar" },
  { deck: "lesson-4", hanzi: "微波", pinyin: "wéi bō", english: "microwave" },
];

const numberCards = [
  [0, "零", "líng"], [1, "一", "yī"], [2, "二", "èr"], [3, "三", "sān"], [4, "四", "sì"],
  [5, "五", "wǔ"], [6, "六", "liù"], [7, "七", "qī"], [8, "八", "bā"], [9, "九", "jiǔ"],
  [10, "十", "shí"], [11, "十一", "shí yī"], [12, "十二", "shí èr"], [15, "十五", "shí wǔ"],
  [20, "二十", "èr shí"], [21, "二十一", "èr shí yī"], [30, "三十", "sān shí"], [48, "四十八", "sì shí bā"],
  [99, "九十九", "jiǔ shí jiǔ"], [100, "一百", "yì bǎi"], [101, "一百零一", "yì bǎi líng yī"],
  [110, "一百一十", "yì bǎi yī shí"], [125, "一百二十五", "yì bǎi èr shí wǔ"], [200, "兩百", "liǎng bǎi"],
  [250, "兩百五十", "liǎng bǎi wǔ shí"], [999, "九百九十九", "jiǔ bǎi jiǔ shí jiǔ"],
  [1000, "一千", "yì qiān"], [1001, "一千零一", "yì qiān líng yī"], [1010, "一千零一十", "yì qiān líng yī shí"],
  [1100, "一千一百", "yì qiān yì bǎi"], [2345, "兩千三百四十五", "liǎng qiān sān bǎi sì shí wǔ"],
  [9999, "九千九百九十九", "jiǔ qiān jiǔ bǎi jiǔ shí jiǔ"], [10000, "一萬", "yí wàn"],
].map(([number, hanzi, pinyin]) => ({
  deck: "numbers",
  hanzi,
  pinyin,
  english: number.toLocaleString("en-US"),
}));

const customCards = JSON.parse(localStorage.getItem("customCards") || "[]");

let cards = [...vocabulary, ...numberCards, ...customCards].map((card, index) => ({
  ...card,
  id: card.id || `${card.deck}-${index}`,
}));

const state = {
  deck: "all",
  mode: "hanzi",
  shuffled: true,
  typing: false,
  revealed: false,
  order: [],
  index: 0,
  correct: 0,
  attempts: 0,
  streak: 0,
  review: new Set(JSON.parse(localStorage.getItem("reviewCards") || "[]")),
};

const els = {
  deckSelect: document.querySelector("#deck-select"),
  deckCount: document.querySelector("#deck-count"),
  score: document.querySelector("#score"),
  streak: document.querySelector("#streak"),
  shuffle: document.querySelector("#shuffle-toggle"),
  typing: document.querySelector("#type-toggle"),
  modeButtons: document.querySelectorAll(".mode-button"),
  reset: document.querySelector("#reset-session"),
  review: document.querySelector("#mark-review"),
  speak: document.querySelector("#speak-card"),
  lesson: document.querySelector("#card-lesson"),
  position: document.querySelector("#card-position"),
  flashcard: document.querySelector("#flashcard"),
  promptLabel: document.querySelector("#prompt-label"),
  front: document.querySelector("#card-front"),
  pinyin: document.querySelector("#card-pinyin"),
  hint: document.querySelector("#tap-hint"),
  answerPanel: document.querySelector("#answer-panel"),
  answerMain: document.querySelector("#answer-main"),
  answerExtra: document.querySelector("#answer-extra"),
  typeForm: document.querySelector("#type-form"),
  typed: document.querySelector("#typed-answer"),
  feedback: document.querySelector("#type-feedback"),
  again: document.querySelector("#again-button"),
  know: document.querySelector("#know-button"),
  list: document.querySelector("#vocab-list"),
  search: document.querySelector("#search-input"),
  addCardForm: document.querySelector("#add-card-form"),
  newHanzi: document.querySelector("#new-hanzi"),
  newPinyin: document.querySelector("#new-pinyin"),
  newEnglish: document.querySelector("#new-english"),
  newDeck: document.querySelector("#new-deck"),
  addStatus: document.querySelector("#add-card-status"),
};

function deckCards() {
  if (state.deck === "all") return cards;
  if (state.deck === "review") return cards.filter((card) => state.review.has(card.id));
  return cards.filter((card) => card.deck === state.deck);
}

function shuffleList(list) {
  const copy = [...list];
  for (let i = copy.length - 1; i > 0; i -= 1) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

function startSession() {
  const active = deckCards();
  state.order = state.shuffled ? shuffleList(active) : [...active];
  state.index = 0;
  state.correct = 0;
  state.attempts = 0;
  state.streak = 0;
  state.revealed = false;
  render();
}

function currentCard() {
  return state.order[state.index];
}

function labelFor(deck) {
  if (deck === "numbers") return "Numbers";
  return deck.replace("-", " ").replace(/\b\w/g, (letter) => letter.toUpperCase());
}

function promptFor(card) {
  if (state.mode === "english") return { label: "English", front: card.english, pinyin: "" };
  if (state.mode === "pinyin") return { label: "Pinyin", front: card.pinyin, pinyin: "" };
  return { label: "Chinese", front: card.hanzi, pinyin: "" };
}

function answerFor(card) {
  if (state.mode === "english") return { main: card.hanzi, extra: card.pinyin };
  if (state.mode === "pinyin") return { main: card.hanzi, extra: card.english };
  return { main: card.english, extra: card.pinyin };
}

function normalize(value) {
  return value
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[;,.?]/g, "")
    .replace(/\s+/g, " ")
    .trim();
}

function expectedAnswers(card) {
  if (state.mode === "english") return [card.hanzi, card.pinyin];
  if (state.mode === "pinyin") return [card.hanzi, card.english];
  return card.english.split(";").concat(card.english.split(/\s+or\s+/i));
}

function reveal() {
  if (!currentCard()) return;
  state.revealed = true;
  renderCard();
}

function grade(known) {
  if (!currentCard()) return;
  state.attempts += 1;
  if (known) {
    state.correct += 1;
    state.streak += 1;
  } else {
    state.streak = 0;
    state.order.push(currentCard());
  }
  state.index = Math.min(state.index + 1, state.order.length - 1);
  state.revealed = false;
  els.typed.value = "";
  els.feedback.textContent = "";
  render();
}

function toggleReview() {
  const card = currentCard();
  if (!card) return;
  if (state.review.has(card.id)) state.review.delete(card.id);
  else state.review.add(card.id);
  localStorage.setItem("reviewCards", JSON.stringify([...state.review]));
  render();
}

function speak() {
  const card = currentCard();
  if (!card || !("speechSynthesis" in window)) return;
  const utterance = new SpeechSynthesisUtterance(card.hanzi.replace(" / ", " "));
  utterance.lang = "zh-TW";
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(utterance);
}

function saveCustomCard(card) {
  const stored = JSON.parse(localStorage.getItem("customCards") || "[]");
  stored.push(card);
  localStorage.setItem("customCards", JSON.stringify(stored));
}

function addCard(event) {
  event.preventDefault();
  const card = {
    id: `custom-${Date.now()}`,
    deck: els.newDeck.value,
    hanzi: els.newHanzi.value.trim(),
    pinyin: els.newPinyin.value.trim(),
    english: els.newEnglish.value.trim(),
  };

  if (!card.hanzi || !card.pinyin || !card.english) return;

  saveCustomCard(card);
  cards = [...cards, card];
  els.addCardForm.reset();
  els.newDeck.value = "custom";
  els.addStatus.textContent = "Added";
  state.deck = card.deck;
  els.deckSelect.value = card.deck;
  startSession();
  window.setTimeout(() => {
    els.addStatus.textContent = "";
  }, 1800);
}

function deleteCustomCard(cardId) {
  const stored = JSON.parse(localStorage.getItem("customCards") || "[]").filter((card) => card.id !== cardId);
  localStorage.setItem("customCards", JSON.stringify(stored));
  cards = cards.filter((card) => card.id !== cardId);
  state.review.delete(cardId);
  localStorage.setItem("reviewCards", JSON.stringify([...state.review]));
  startSession();
}

function renderCard() {
  const card = currentCard();
  const total = state.order.length;
  els.deckCount.textContent = total;
  els.score.textContent = `${state.correct}/${state.attempts}`;
  els.streak.textContent = state.streak;

  if (!card) {
    els.lesson.textContent = state.deck === "review" ? "Review deck is empty" : "No cards";
    els.position.textContent = "0 / 0";
    els.front.textContent = "Add cards to review or choose another deck";
    els.pinyin.textContent = "";
    els.answerPanel.classList.add("hidden");
    els.typeForm.classList.add("hidden");
    return;
  }

  const prompt = promptFor(card);
  const answer = answerFor(card);
  els.lesson.textContent = labelFor(card.deck);
  els.position.textContent = `${state.index + 1} / ${total}`;
  els.promptLabel.textContent = prompt.label;
  els.front.textContent = prompt.front;
  els.pinyin.textContent = prompt.pinyin;
  els.hint.textContent = state.revealed ? "Answer shown" : "Tap to reveal";
  els.answerMain.textContent = answer.main;
  els.answerExtra.textContent = answer.extra;
  els.answerPanel.classList.toggle("hidden", !state.revealed);
  els.typeForm.classList.toggle("hidden", !state.typing);
  els.review.querySelector("span").textContent = state.review.has(card.id) ? "★" : "☆";
}

function renderList() {
  const query = normalize(els.search.value);
  const active = deckCards().filter((card) => {
    const haystack = normalize(`${card.hanzi} ${card.pinyin} ${card.english} ${labelFor(card.deck)}`);
    return haystack.includes(query);
  });

  els.list.innerHTML = active
    .map((card) => `
      <article class="vocab-row">
        <strong>${card.hanzi}</strong>
        <span>${card.pinyin}</span>
        <span>${card.english}</span>
        <small>${labelFor(card.deck)}</small>
        ${card.id.startsWith("custom-") ? `<button class="delete-card" type="button" data-card-id="${card.id}" title="Delete custom card">×</button>` : ""}
      </article>
    `)
    .join("");
}

function render() {
  renderCard();
  renderList();
}

els.deckSelect.addEventListener("change", () => {
  state.deck = els.deckSelect.value;
  startSession();
});

els.shuffle.addEventListener("change", () => {
  state.shuffled = els.shuffle.checked;
  startSession();
});

els.typing.addEventListener("change", () => {
  state.typing = els.typing.checked;
  render();
});

els.modeButtons.forEach((button) => {
  button.addEventListener("click", () => {
    state.mode = button.dataset.mode;
    els.modeButtons.forEach((item) => item.classList.toggle("active", item === button));
    state.revealed = false;
    render();
  });
});

els.flashcard.addEventListener("click", reveal);
els.again.addEventListener("click", () => grade(false));
els.know.addEventListener("click", () => grade(true));
els.reset.addEventListener("click", startSession);
els.review.addEventListener("click", toggleReview);
els.speak.addEventListener("click", speak);
els.search.addEventListener("input", renderList);
els.addCardForm.addEventListener("submit", addCard);
els.list.addEventListener("click", (event) => {
  const button = event.target.closest(".delete-card");
  if (!button) return;
  deleteCustomCard(button.dataset.cardId);
});

els.typeForm.addEventListener("submit", (event) => {
  event.preventDefault();
  const card = currentCard();
  if (!card) return;
  const answer = normalize(els.typed.value);
  const matched = expectedAnswers(card).some((expected) => normalize(expected).includes(answer) || answer.includes(normalize(expected)));
  els.feedback.textContent = matched ? "Correct" : `Answer: ${answerFor(card).main} (${answerFor(card).extra})`;
  state.revealed = true;
  renderCard();
  if (matched) grade(true);
});

document.addEventListener("keydown", (event) => {
  if (event.target.matches("input, select")) return;
  if (event.code === "Space") {
    event.preventDefault();
    reveal();
  }
  if (event.key === "ArrowLeft") grade(false);
  if (event.key === "ArrowRight") grade(true);
});

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./service-worker.js").catch(() => {});
  });
}

startSession();

</script>
